apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-chat-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-chat-server
  template:
    metadata:
      labels:
        app: tcp-chat-server
    spec:
      containers:
        - name: chat-server
          image: tcp-chat-server:latest
          imagePullPolicy: Never # Важливо для роботи з локальними образами в Minikube
          ports:
            - containerPort: 7150
---
apiVersion: v1
kind: Service
metadata:
  name: tcp-chat-service
spec:
  type: NodePort
  selector:
    app: tcp-chat-server
  ports:
    - protocol: TCP
      port: 7150
      targetPort: 7150
      nodePort: 30150